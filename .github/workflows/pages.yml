name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: wasm-${{ hashFiles('mega_blastoise_web/Cargo.lock') }}
          restore-keys: wasm-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        working-directory: mega_blastoise_web
        run: wasm-pack build --target web --release

      - name: Assemble site
        run: |
          mkdir -p _site/pkg
          cp mega_blastoise_web/www/index.html _site/
          cp mega_blastoise_web/www/style.css  _site/
          cp mega_blastoise_web/www/app.js     _site/
          cp mega_blastoise_web/pkg/*.js       _site/pkg/
          cp mega_blastoise_web/pkg/*.wasm     _site/pkg/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
