<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mega Blastoise — Gen 1 Randbat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Demo mode trigger -->
  <div id="demo-row">
    <button id="vs-ai-btn" class="demo-btn">VS AI</button>
    <button id="demo-btn" class="demo-btn">DEMO</button>
  </div>

  <!-- Player panels -->
  <div id="players">

    <div class="player-panel" id="panel-p1" data-player="1">
      <div class="panel-header p1-color">RED</div>
      <!-- OLED flanked by move button columns -->
      <div class="oled-area">
        <div class="move-col">
          <button class="btn move-btn" id="p1-m0"></button>
          <button class="btn move-btn" id="p1-m2"></button>
        </div>
        <canvas id="oled-p1" width="128" height="64" class="oled"></canvas>
        <div class="move-col">
          <button class="btn move-btn" id="p1-m1"></button>
          <button class="btn move-btn" id="p1-m3"></button>
        </div>
      </div>
      <div class="switch-row">
        <button class="btn switch-btn" id="p1-s0" >S1</button>
        <button class="btn switch-btn" id="p1-s1" >S2</button>
        <button class="btn switch-btn" id="p1-s2" >S3</button>
      </div>
      <!-- P1 LEDs: HP 0-7, party 8-10, status 11 -->
      <div class="led-row" id="leds-p1">
        <div class="led-group">
          <div class="led" id="led-0"></div><div class="led" id="led-1"></div>
          <div class="led" id="led-2"></div><div class="led" id="led-3"></div>
          <div class="led" id="led-4"></div><div class="led" id="led-5"></div>
          <div class="led" id="led-6"></div><div class="led" id="led-7"></div>
        </div>
        <div class="led-group">
          <div class="led party" id="led-8"></div>
          <div class="led party" id="led-9"></div>
          <div class="led party" id="led-10"></div>
        </div>
        <div class="led-group">
          <div class="led status" id="led-11"></div>
        </div>
      </div>
    </div>

    <div class="player-panel" id="panel-p2" data-player="2">
      <div class="panel-header p2-color">BLUE</div>
      <div class="oled-area">
        <div class="move-col">
          <button class="btn move-btn" id="p2-m0"></button>
          <button class="btn move-btn" id="p2-m2"></button>
        </div>
        <canvas id="oled-p2" width="128" height="64" class="oled"></canvas>
        <div class="move-col">
          <button class="btn move-btn" id="p2-m1"></button>
          <button class="btn move-btn" id="p2-m3"></button>
        </div>
      </div>
      <div class="switch-row">
        <button class="btn switch-btn" id="p2-s0" >S1</button>
        <button class="btn switch-btn" id="p2-s1" >S2</button>
        <button class="btn switch-btn" id="p2-s2" >S3</button>
      </div>
      <!-- P2 LEDs: reversed so status is innermost (near divider), HP outermost -->
      <div class="led-row" id="leds-p2">
        <div class="led-group">
          <div class="led status" id="led-23"></div>
        </div>
        <div class="led-group">
          <div class="led party" id="led-22"></div>
          <div class="led party" id="led-21"></div>
          <div class="led party" id="led-20"></div>
        </div>
        <div class="led-group">
          <div class="led" id="led-19"></div><div class="led" id="led-18"></div>
          <div class="led" id="led-17"></div><div class="led" id="led-16"></div>
          <div class="led" id="led-15"></div><div class="led" id="led-14"></div>
          <div class="led" id="led-13"></div><div class="led" id="led-12"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- CLI terminal output -->
  <div id="terminal">
    <pre id="log"></pre>
    <div id="input-row">
      <span id="prompt">&gt;</span><input
        id="input"
        type="text"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="type or press buttons above"
      >
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
