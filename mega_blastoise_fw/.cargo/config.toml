[target.'cfg(all(target_arch = "arm", target_os = "none"))']
runner = ["probe-rs", "run", "--preset", "pico", "--log-format=oneline"]
rustflags = [
  "-C", "link-arg=-Tlink.x",
  "-C", "link-arg=-Tdefmt.x",
  "-C", "link-arg=--nmagic",
]

[env]
DEFMT_LOG = "info"

[build]
target = "thumbv6m-none-eabi"

[alias]
rb = "run --bin"
rrb = "run --release --bin"
